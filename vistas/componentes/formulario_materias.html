<div class="gestion-materias-container">
    <div class="form-unificado">
        <form id="form-materia-completa">
            <!-- Información de la Materia -->
            <div class="form-section">
                <h3>📖 Información de la Materia</h3>
                <div class="form-group">
                    <label for="nombre-materia">Nombre de la Materia *</label>
                    <input type="text" id="nombre-materia" name="nombre_materia"
                        placeholder="Ej: Matemáticas, Lengua, Ciencias..." required>
                </div>
            </div>

            <!-- Horarios de la Materia -->
            <div class="form-section">
                <h3>🕒 Horarios de Clase</h3>
                <p class="section-description">Agrega los días y horarios en que tienes esta materia</p>

                <div id="horarios-container">
                    <div class="horario-item">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Día</label>
                                <select name="dias[]" required>
                                    <option value="">Selecciona un día</option>
                                    <option value="1">Lunes</option>
                                    <option value="2">Martes</option>
                                    <option value="3">Miércoles</option>
                                    <option value="4">Jueves</option>
                                    <option value="5">Viernes</option>
                                    <option value="6">Sábado</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Horario</label>
                                <input type="time" name="horarios[]" required>
                            </div>
                            <div class="form-group">
                                <label>&nbsp;</label>
                                <button type="button" class="btn-remove" style="display: none;">
                                    ❌
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-add" id="btn-agregar-horario">
                    ➕ Agregar otro horario
                </button>
            </div>

            <!-- Información del Profesor -->
            <div class="form-section">
                <h3>👨‍🏫 Información del Profesor</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre-profesor">Nombre del Profesor *</label>
                        <input type="text" id="nombre-profesor" name="nombre_profesor" placeholder="Ej: María" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido-profesor">Apellido del Profesor *</label>
                        <input type="text" id="apellido-profesor" name="apellido_profesor" placeholder="Ej: González"
                            required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email-profesor">Email del Profesor</label>
                    <input type="email" id="email-profesor" name="email_profesor"
                        placeholder="Ej: profe.maria@escuela.edu">
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-add">
                    ➕ Agregar otro horario
                </button>

                <button type="button" class="btn-cancel">
                    🗑️ Limpiar Formulario
                </button>
            </div>
        </form>
    </div>
</div>
