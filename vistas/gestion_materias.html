<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Materia - Sistema Escolar</title>
    <link rel="stylesheet" href="estilos/gestion_materias.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Agregar Nueva Materia</h1>
            <p>Completa todos los datos de la materia, horarios y profesor</p>
        </div>

        <div class="form-unificado">
            <form id="form-materia-completa">
                <!-- Información de la Materia -->
                <div class="form-section">
                    <h2>📖 Información de la Materia</h2>
                    <div class="form-group">
                        <label for="nombre-materia">Nombre de la Materia *</label>
                        <input type="text" id="nombre-materia" name="nombre_materia" 
                               placeholder="Ej: Matemáticas, Lengua, Ciencias..." required>
                    </div>
                </div>

                <!-- Horarios de la Materia -->
                <div class="form-section">
                    <h2>🕒 Horarios de Clase</h2>
                    <p class="section-description">Agrega los días y horarios en que tienes esta materia</p>
                    
                    <div id="horarios-container">
                        <div class="horario-item">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Día</label>
                                    <select name="dias[]" required>
                                        <option value="">Selecciona un día</option>
                                        <option value="1">Lunes</option>
                                        <option value="2">Martes</option>
                                        <option value="3">Miércoles</option>
                                        <option value="4">Jueves</option>
                                        <option value="5">Viernes</option>
                                        <option value="6">Sábado</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Horario</label>
                                    <input type="time" name="horarios[]" required>
                                </div>
                                <div class="form-group">
                                    <label>&nbsp;</label>
                                    <button type="button" class="btn-remove" onclick="removerHorario(this)" style="display: none;">
                                        ❌
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" class="btn-add" onclick="agregarHorario()">
                        ➕ Agregar otro horario
                    </button>
                </div>

                <!-- Información del Profesor -->
                <div class="form-section">
                    <h2>👨‍🏫 Información del Profesor</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre-profesor">Nombre del Profesor *</label>
                            <input type="text" id="nombre-profesor" name="nombre_profesor" 
                                   placeholder="Ej: María" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido-profesor">Apellido del Profesor *</label>
                            <input type="text" id="apellido-profesor" name="apellido_profesor" 
                                   placeholder="Ej: González" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email-profesor">Email del Profesor</label>
                        <input type="email" id="email-profesor" name="email_profesor" 
                               placeholder="Ej: profe.maria@escuela.edu">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        💾 Guardar Materia Completa
                    </button>
                    <button type="button" class="btn-cancel" onclick="limpiarFormulario()">
                        🗑️ Limpiar Formulario
                    </button>
                </div>
            </form>
        </div>

        <!-- Materias Registradas -->
        <div class="list-section">
            <h2>📋 Mis Materias Registradas</h2>
            <div id="lista-materias" class="materias-list">
                <div class="loading">Cargando materias...</div>
            </div>
        </div>
    </div>

    <script src="../controles/gestion_materias.js"></script>
</body>
</html>
